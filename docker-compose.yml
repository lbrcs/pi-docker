services:
  # ── Squid sidecar — network filtering ──────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    image: pi-proxy
    read_only: true
    tmpfs:
      - /run:uid=13,gid=13
      - /var/log/squid:uid=13,gid=13
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    networks:
      - pi-net      # receives pi's traffic on the isolated internal network
      - proxy-net   # the only container with a real internet route
    # No ports exposed to the host — only accessible within pi-net
    restart: "no"

  # ── Pi agent ───────────────────────────────────────────────────────────
  pi:
    build:
      context: .
      dockerfile: Dockerfile
    image: pi-agent
    stdin_open: true
    tty: true
    init: true
    depends_on:
      - proxy

    # ── Security ────────────────────────────────────────────────────────
    # pi-net is internal (no gateway) so this container has zero direct
    # internet access — all outbound traffic must go via the proxy sidecar.
    # No NET_ADMIN, no elevated capabilities needed.
    security_opt:
      - no-new-privileges:true

    # ── Resource limits ─────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
          pids: 512
        reservations:
          memory: 512m

    tmpfs:
      - /tmp

    volumes:
      # ── The repo you're working in (set by launcher) ─────────────────
      - ${PI_REPO:-.}:/workspace:rw

      # ── Global config injected into the container ────────────────────
      - ${PI_DOCKER_HOME:-.}/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ${PI_DOCKER_HOME:-.}/AGENTS.md:/defaults/AGENTS.md:ro
      - ${PI_DOCKER_HOME:-.}/extensions:/defaults/extensions:ro

      # ── Pi config (persists auth, sessions across all repos) ─────────
      # Bind-mount the host's pi auth dir so the container reuses the same
      # Anthropic session — no separate OAuth flow needed inside Docker.
      - ${HOME}/.pi/agent:/home/piuser/.pi/agent:rw

      # ── Ollama models config (managed by pi-docker-models script) ────
      # Run 'pi-docker-models ollama enable' to set up local models.
      # The script generates docker-compose.override.yml with this mount.

    environment:
      # Subagent config
      PI_WORKSPACE: /workspace
      PI_SUBAGENT_TIMEOUT_MINUTES: "30"

      # Route all traffic through the Squid sidecar
      http_proxy: "http://proxy:3128"
      https_proxy: "http://proxy:3128"
      HTTP_PROXY: "http://proxy:3128"
      HTTPS_PROXY: "http://proxy:3128"
      no_proxy: "localhost,127.0.0.1"
      NO_PROXY: "localhost,127.0.0.1"

      # GitHub auth — fine-grained PAT passed in by the launcher
      GH_TOKEN: "${PI_GH_TOKEN:-}"

      # API key auth — passed through if set on the host (alternative to OAuth)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"

      # ── Local model fallback (managed by pi-docker-models script) ────
      # Run 'pi-docker-models ollama enable' to configure Ollama.
      # The script generates docker-compose.override.yml with OLLAMA_HOST.

    networks:
      - pi-net

networks:
  pi-net:
    driver: bridge
    internal: true  # no default gateway — pi cannot reach the internet directly
  proxy-net:
    driver: bridge  # internet-capable network used exclusively by the proxy

volumes: {}
