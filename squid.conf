# Listen on all interfaces inside the container (pi connects via Docker network)
http_port 3128

# ── Domain allowlist ──────────────────────────────────────────────────────
acl allowed_domains dstdomain api.anthropic.com
acl allowed_domains dstdomain platform.claude.com
acl allowed_domains dstdomain github.com
acl allowed_domains dstdomain api.github.com
acl allowed_domains dstdomain objects.githubusercontent.com
acl allowed_domains dstdomain github-releases.githubusercontent.com
acl allowed_domains dstdomain release-assets.githubusercontent.com
acl allowed_domains dstdomain registry.npmjs.org

# HTTPS tunneling (CONNECT method) — required for TLS traffic
acl SSL_ports port 443
acl CONNECT method CONNECT

# Allow CONNECT only to port 443 on allowed domains
http_access allow CONNECT SSL_ports allowed_domains

# Allow regular HTTP to allowed domains
http_access allow allowed_domains

# Deny everything else
http_access deny all

# ── Logging ──────────────────────────────────────────────────────────────
# Log to stdout/stderr so `docker compose logs proxy` works
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr

# No caching — we're just filtering, not accelerating
cache deny all
